<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVA Beheer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#F6F4EF;min-height:100vh}
header{background:#1A2B5F;padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between}
.hlogo{font-size:15px;font-weight:600;color:#fff}.hlogo span{color:#E8500A}
.hright{display:flex;align-items:center;gap:12px}
.huser{font-size:13px;color:rgba(255,255,255,.6)}
.hbtn{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none}
.hbtn-outline{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff}
.hbtn-orange{background:#E8500A;color:#fff}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1A2B5F}
.login-box{background:#fff;border-radius:12px;padding:2rem;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-box h2{font-size:20px;font-weight:700;color:#1A2B5F;margin-bottom:.25rem}
.login-box p{font-size:13px;color:#6B6760;margin-bottom:1.5rem}
.login-box label{font-size:12px;font-weight:600;color:#6B6760;display:block;margin-bottom:4px}
.login-box input{width:100%;height:40px;border:1.5px solid #E2DFD8;border-radius:8px;padding:0 12px;font-size:14px;margin-bottom:1rem;outline:none}
.login-box input:focus{border-color:#1A2B5F}
.login-box button{width:100%;height:42px;background:#1A2B5F;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.login-error{color:#E8500A;font-size:13px;margin-top:.5rem;text-align:center}
#main{display:none;max-width:900px;margin:0 auto;padding:1.5rem}
.card{background:#fff;border-radius:12px;border:1px solid #E2DFD8;padding:1.5rem;margin-bottom:1.25rem}
.card h3{font-size:16px;font-weight:600;color:#1A2B5F;margin-bottom:1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
label{font-size:12px;font-weight:600;color:#6B6760;display:block;margin-bottom:4px}
input,select{width:100%;height:38px;border:1.5px solid #E2DFD8;border-radius:7px;padding:0 10px;font-size:13px;outline:none;font-family:inherit}
input:focus,select:focus{border-color:#1A2B5F}
.btn{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.btn-primary{background:#1A2B5F;color:#fff}
.btn-orange{background:#E8500A;color:#fff}
.btn-danger{background:#fee2e2;color:#b91c1c}
.btn-sm{padding:5px 12px;font-size:12px}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:#B0ACA2;text-transform:uppercase;letter-spacing:.05em;padding:.5rem .75rem;text-align:left;border-bottom:1px solid #E2DFD8}
td{padding:.65rem .75rem;font-size:13px;color:#2C2B27;border-bottom:1px solid #F0EEE9}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-dir{background:#E6F1FB;color:#0C447C}
.badge-mak{background:#EAF3DE;color:#27500A}
.badge-on{background:#EAF3DE;color:#27500A}
.badge-off{background:#F0EEE9;color:#B0ACA2}
.msg{padding:.75rem 1rem;border-radius:8px;font-size:13px;margin-bottom:1rem}
.msg-ok{background:#EAF3DE;color:#27500A}
.msg-err{background:#fee2e2;color:#b91c1c}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2>MVA <span style="color:#E8500A">Beheer</span></h2>
    <p>Inloggen als directie</p>
    <label>E-mailadres</label>
    <input type="email" id="lemail" placeholder="naam@makelaarsvan.nl">
    <label>Wachtwoord</label>
    <input type="password" id="lpwd" placeholder="Wachtwoord" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Inloggen</button>
    <div class="login-error" id="lerr"></div>
  </div>
</div>

<header style="display:none" id="hdr">
  <div class="hlogo">MVA <span>Beheer</span></div>
  <div class="hright">
    <span class="huser" id="huser"></span>
    <button class="hbtn hbtn-outline" onclick="location.href='https://q-and-a-mva.netlify.app'">← Q&A</button>
    <button class="hbtn hbtn-outline" onclick="location.href='https://mva-intelligence.netlify.app'">Portal</button>
    <button class="hbtn hbtn-outline" onclick="doLogout()">Uitloggen</button>
  </div>
</header>

<div id="main">
  <div id="msg-area"></div>

  <div class="card">
    <h3>Nieuwe gebruiker toevoegen</h3>
    <div class="form-row three">
      <div><label>Naam</label><input id="fnaam" placeholder="Jan de Vries"></div>
      <div><label>E-mailadres</label><input id="femail" placeholder="jan@makelaarsvan.nl"></div>
      <div><label>Niveau</label>
        <select id="flevel">
          <option value="makelaar">Makelaar</option>
          <option value="directie">Directie</option>
          <option value="compliance">Compliance</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div><label>Wachtwoord</label><input id="fpwd" placeholder="Tijdelijk wachtwoord" value="MVA2026!"></div>
      <div style="display:flex;align-items:flex-end">
        <button class="btn btn-orange" onclick="addUser()" style="height:38px;width:100%">Gebruiker toevoegen</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <h3 style="margin:0">Alle gebruikers</h3>
      <button class="btn btn-sm btn-primary" onclick="loadUsers()">Vernieuwen</button>
    </div>
    <div id="tbl-area"><p style="color:#B0ACA2;font-size:13px">Laden...</p></div>
  </div>
</div>

<script>
const SUPA_URL = 'https://ehqtyhoeubchcwfavdzr.supabase.co';
const SUPA_KEY = 'sb_publishable_OqTL874jsDEMKg9LomfrmQ_nwIo6Wet';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

let currentUser = null;

function showMsg(txt, ok) {
  const a = document.getElementById('msg-area');
  a.innerHTML = '<div class="msg ' + (ok?'msg-ok':'msg-err') + '">' + txt + '</div>';
  setTimeout(() => a.innerHTML = '', 4000);
}

async function doLogin() {
  const email = document.getElementById('lemail').value.trim();
  const pwd = document.getElementById('lpwd').value;
  document.getElementById('lerr').textContent = '';
  
  try {
    const r = await fetch('/.netlify/functions/auth', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action:'login', email, password: pwd})
    });
    const d = await r.json();
    if (!d.success) { document.getElementById('lerr').textContent = 'Ongeldige inloggegevens'; return; }
    if (d.level !== 'directie' && d.level !== 'level2') {
      document.getElementById('lerr').textContent = 'Alleen directie heeft toegang'; return;
    }
    currentUser = d;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('hdr').style.display = 'flex';
    document.getElementById('main').style.display = 'block';
    document.getElementById('huser').textContent = d.name;
    loadUsers();
  } catch(e) {
    document.getElementById('lerr').textContent = 'Verbindingsfout: ' + e.message;
  }
}

function doLogout() {
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('hdr').style.display = 'none';
  document.getElementById('main').style.display = 'none';
  document.getElementById('lemail').value = '';
  document.getElementById('lpwd').value = '';
}

async function loadUsers() {
  const { data, error } = await db.from('gebruikers').select('*').order('naam');
  if (error) { document.getElementById('tbl-area').innerHTML = '<p style="color:red">Fout: ' + error.message + '</p>'; return; }
  if (!data || !data.length) { document.getElementById('tbl-area').innerHTML = '<p style="color:#B0ACA2;font-size:13px">Geen gebruikers gevonden</p>'; return; }
  
  let rows = data.map(u => '<tr>'
    + '<td>' + esc(u.naam) + '</td>'
    + '<td style="color:#6B6760">' + esc(u.email) + '</td>'
    + '<td><span class="badge ' + (u.level==='directie'?'badge-dir':'badge-mak') + '">' + esc(u.level) + '</span></td>'
    + '<td><span class="badge ' + (u.actief?'badge-on':'badge-off') + '">' + (u.actief?'Actief':'Inactief') + '</span></td>'
    + '<td style="color:#B0ACA2;font-size:12px">' + (u.created_at?u.created_at.slice(0,10):'') + '</td>'
    + '<td><button class="btn btn-sm btn-danger" onclick="deleteUser(\'' + u.id + '\',\'' + esc(u.naam) + '\')">Verwijder</button></td>'
    + '</tr>').join('');
  
  document.getElementById('tbl-area').innerHTML = '<table>'
    + '<thead><tr><th>Naam</th><th>E-mail</th><th>Niveau</th><th>Status</th><th>Aangemaakt</th><th>Actie</th></tr></thead>'
    + '<tbody>' + rows + '</tbody></table>';
}

async function addUser() {
  const naam = document.getElementById('fnaam').value.trim();
  const email = document.getElementById('femail').value.trim().toLowerCase();
  const level = document.getElementById('flevel').value;
  const pwd = document.getElementById('fpwd').value;
  
  if (!naam || !email || !pwd) { showMsg('Vul alle velden in', false); return; }
  
  // Genereer salt en hash
  const salt = Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
  const msgBuffer = new TextEncoder().encode(pwd);
  const keyBuffer = new TextEncoder().encode(salt);
  const key = await crypto.subtle.importKey('raw', keyBuffer, {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', key, msgBuffer);
  const hashArray = Array.from(new Uint8Array(sig));
  const passwordHash = hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
  
  const { data, error } = await db.from('gebruikers').insert([{
    naam, email, level, salt, password_hash: passwordHash, actief: true
  }]).select();
  
  if (error) { showMsg('Fout: ' + error.message, false); return; }
  
  showMsg('Gebruiker ' + naam + ' aangemaakt. Wachtwoord: ' + pwd, true);
  document.getElementById('fnaam').value = '';
  document.getElementById('femail').value = '';
  document.getElementById('fpwd').value = 'MVA2026!';
  loadUsers();
}

async function deleteUser(id, naam) {
  if (!confirm('Verwijder ' + naam + '?')) return;
  const { error } = await db.from('gebruikers').delete().eq('id', id);
  if (error) { showMsg('Fout: ' + error.message, false); return; }
  showMsg(naam + ' verwijderd', true);
  loadUsers();
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
