<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVA Academie — Gebruikersbeheer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
  .header { background: #1A2B5F; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header span { color: #E8500A; }
  .container { max-width: 900px; margin: 32px auto; padding: 0 16px; }
  .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
  .card-header { padding: 20px 24px 16px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
  .card-title { font-size: 16px; font-weight: 700; color: #1A2B5F; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #888; border-bottom: 2px solid #eee; }
  td { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-directie { background: #1A2B5F22; color: #1A2B5F; }
  .badge-makelaar { background: #E8500A22; color: #E8500A; }
  .badge-actief { background: #22c55e22; color: #16a34a; }
  .badge-inactief { background: #ef444422; color: #dc2626; }
  .btn { padding: 7px 14px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
  .btn:hover { opacity: .8; }
  .btn-primary { background: #1A2B5F; color: white; }
  .btn-orange { background: #E8500A; color: white; }
  .btn-danger { background: #ef4444; color: white; }
  .btn-secondary { background: #f0f2f5; color: #555; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; }
  .form-input { width: 100%; padding: 10px 12px; border: 2px solid #e5e7eb; border-radius: 6px; font-size: 14px; }
  .form-input:focus { outline: none; border-color: #1A2B5F; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-body { padding: 24px; }
  .msg { padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
  .msg-success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
  .msg-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #1A2B5F; }
  .login-box { background: white; padding: 40px; border-radius: 12px; width: 360px; text-align: center; }
  .login-box h2 { color: #1A2B5F; margin-bottom: 8px; }
  .login-box p { color: #888; font-size: 13px; margin-bottom: 24px; }
  #mainContent { display: none; }
  .actions { display: flex; gap: 8px; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h2>MVA <span style="color:#E8500A">Beheer</span></h2>
    <p>Inloggen als directie</p>
    <div id="loginMsg"></div>
    <div class="form-group">
      <input class="form-input" type="email" id="loginEmail" placeholder="E-mailadres">
    </div>
    <div class="form-group">
      <input class="form-input" type="password" id="loginPass" placeholder="Wachtwoord">
    </div>
    <button class="btn btn-primary" style="width:100%;padding:12px" onclick="doLogin()">Inloggen</button>
  </div>
</div>

<div id="mainContent">
  <div class="header">
    <h1>MVA Academie — <span>Gebruikersbeheer</span></h1>
    <div style="margin-left:auto;font-size:13px;opacity:.7" id="headerName"></div>
    <a href="/" class="btn btn-secondary" style="margin-left:8px">← MVA Academie Q&A</a><button class="btn btn-secondary" onclick="doLogout()" style="margin-left:8px">Uitloggen</button>
  </div>

  <div class="container">
    <div id="mainMsg"></div>

    <!-- Gebruikers toevoegen -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Nieuwe gebruiker toevoegen</div>
      </div>
      <div class="form-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Naam</label>
            <input class="form-input" id="newNaam" placeholder="Jan de Vries">
          </div>
          <div class="form-group">
            <label class="form-label">E-mailadres</label>
            <input class="form-input" id="newEmail" placeholder="jan@makelaarsvan.nl">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Wachtwoord</label>
            <input class="form-input" type="password" id="newPass" placeholder="Minimaal 8 tekens">
          </div>
          <div class="form-group">
            <label class="form-label">Niveau</label>
            <select class="form-input" id="newLevel">
              <option value="makelaar">Makelaar</option>
              <option value="directie">Directie</option>
            </select>
          </div>
        </div>
        <button class="btn btn-orange" onclick="addGebruiker()">Gebruiker toevoegen</button>
      </div>
    </div>

    <!-- Gebruikerslijst -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Alle gebruikers</div>
        <button class="btn btn-secondary" onclick="loadGebruikers()">↻ Vernieuwen</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Naam</th>
            <th>E-mailadres</th>
            <th>Niveau</th>
            <th>Status</th>
            <th>Aangemaakt</th>
            <th>Acties</th>
          </tr>
        </thead>
        <tbody id="gebruikersLijst">
          <tr><td colspan="6" style="text-align:center;color:#888;padding:24px">Laden...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
let _token = null;

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  document.getElementById('loginMsg').innerHTML = '';
  
  const res = await fetch('/.netlify/functions/auth', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ action: 'login', email, password: pass })
  });
  const data = await res.json();
  
  if (!res.ok || data.error) {
    document.getElementById('loginMsg').innerHTML = `<div class="msg msg-error">${data.error}</div>`;
    return;
  }
  if (data.level !== 'directie') {
    document.getElementById('loginMsg').innerHTML = `<div class="msg msg-error">Alleen directie heeft toegang tot dit beheerportaal.</div>`;
    return;
  }
  
  _token = data.token;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
  document.getElementById('headerName').textContent = data.name;
  loadGebruikers();
}

function doLogout() {
  _token = null;
  location.reload();
}

async function adminCall(body) {
  const res = await fetch('/.netlify/functions/admin', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ ...body, token: _token })
  });
  return res.json();
}

async function loadGebruikers() {
  const data = await adminCall({ action: 'list' });
  const lijst = document.getElementById('gebruikersLijst');
  
  if (!data.gebruikers?.length) {
    lijst.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#888;padding:24px">Geen gebruikers gevonden</td></tr>';
    return;
  }
  
  lijst.innerHTML = data.gebruikers.map(g => `
    <tr>
      <td><strong>${g.naam}</strong></td>
      <td>${g.email}</td>
      <td><span class="badge badge-${g.level}">${g.level}</span></td>
      <td><span class="badge badge-${g.actief ? 'actief' : 'inactief'}">${g.actief ? 'Actief' : 'Inactief'}</span></td>
      <td>${new Date(g.aangemaakt).toLocaleDateString('nl-NL')}</td>
      <td>
        <div class="actions">
          <button class="btn btn-secondary" onclick="toggleGebruiker('${g.id}', ${g.actief})">${g.actief ? 'Deactiveer' : 'Activeer'}</button>
          <button class="btn btn-danger" onclick="deleteGebruiker('${g.id}', '${g.naam}')">Verwijder</button>
        </div>
      </td>
    </tr>
  `).join('');
}

async function addGebruiker() {
  const naam = document.getElementById('newNaam').value.trim();
  const email = document.getElementById('newEmail').value.trim();
  const wachtwoord = document.getElementById('newPass').value;
  const level = document.getElementById('newLevel').value;
  
  if (!naam || !email || !wachtwoord) {
    showMsg('Vul naam, e-mailadres en wachtwoord in.', 'error');
    return;
  }
  
  const data = await adminCall({ action: 'add', gebruiker: { naam, email, level, wachtwoord } });
  
  if (data.error) {
    showMsg(data.error, 'error');
    return;
  }
  
  showMsg(`${naam} is toegevoegd als ${level}.`, 'success');
  document.getElementById('newNaam').value = '';
  document.getElementById('newEmail').value = '';
  document.getElementById('newPass').value = '';
  loadGebruikers();
}

async function toggleGebruiker(id, actief) {
  await adminCall({ action: 'toggle', id });
  loadGebruikers();
}

async function deleteGebruiker(id, naam) {
  if (!confirm(`Weet je zeker dat je ${naam} wilt verwijderen?`)) return;
  await adminCall({ action: 'delete', id });
  showMsg(`${naam} is verwijderd.`, 'success');
  loadGebruikers();
}

function showMsg(tekst, type) {
  const el = document.getElementById('mainMsg');
  el.innerHTML = `<div class="msg msg-${type}">${tekst}</div>`;
  setTimeout(() => el.innerHTML = '', 4000);
}

document.getElementById('loginEmail').addEventListener('keydown', e => e.key === 'Enter' && doLogin());
document.getElementById('loginPass').addEventListener('keydown', e => e.key === 'Enter' && doLogin());
</script>
</body>
</html>
