<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVA Academie â Vraag & Antwoord</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1A2B5F;
  --orange: #E8500A;
  --dark: #2D2D2D;
  --mid: #555;
  --light: #888;
  --border: #D8D8D8;
  --bg: #F6F6F6;
  --white: #FFF;
  --green: #2E7D32;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: 'Roboto', sans-serif;
  font-size: 14px;
  background: var(--bg);
  color: var(--dark);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* HEADER */
.header {
  background: var(--navy);
  border-bottom: 4px solid var(--orange);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}
.logo-wrap { line-height: 1.1; }
.logo-top { font-size: 10px; font-weight: 900; color: var(--orange); text-transform: uppercase; letter-spacing: .1em; }
.logo-bot { font-size: 10px; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: .1em; }
.header-div { width: 1px; height: 32px; background: rgba(255,255,255,.2); }
.header-text { flex: 1; }
.header-title { font-size: 17px; font-weight: 900; color: white; }
.header-title span { color: var(--orange); }
.header-sub { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 2px; }
.header-badge {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15);
  padding: 5px 12px;
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,.5);
  text-transform: uppercase;
  letter-spacing: .08em;
  white-space: nowrap;
}

/* LAYOUT */
.body-wrap {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
  padding: 0 20px;
}

/* CHIPS */
.chips-wrap {
  padding: 16px 0 12px;
  flex-shrink: 0;
}
.chips-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--light);
  margin-bottom: 8px;
}
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.chip {
  padding: 5px 12px;
  background: white;
  border: 1.5px solid var(--border);
  font-size: 12px;
  font-weight: 500;
  color: var(--mid);
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
  line-height: 1.4;
}
.chip:hover { border-color: var(--orange); color: var(--orange); background: #FFF5F0; }

/* CHAT */
.chat-wrap {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 8px 0 16px;
}
.chat-wrap::-webkit-scrollbar { width: 4px; }
.chat-wrap::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

/* WELCOME */
.welcome {
  background: white;
  border: 1px solid var(--border);
  border-top: 4px solid var(--orange);
  padding: 22px 26px;
}
.welcome-title { font-size: 16px; font-weight: 900; color: var(--navy); margin-bottom: 8px; }
.welcome-title span { color: var(--orange); }
.welcome-body { font-size: 13px; color: var(--mid); line-height: 1.65; margin-bottom: 14px; }
.welcome-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.welcome-item { background: var(--bg); border: 1px solid var(--border); padding: 9px 12px; }
.welcome-item-title { font-size: 10px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px; }
.welcome-item-sub { font-size: 11px; color: var(--light); }

/* MESSAGES */
.msg {
  display: flex;
  gap: 10px;
  animation: fadeUp .2s ease;
}
.msg.user { flex-direction: row-reverse; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.msg-avatar {
  width: 32px;
  height: 32px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 900;
  letter-spacing: .04em;
}
.msg.assistant .msg-avatar { background: var(--navy); color: var(--orange); }
.msg.user .msg-avatar { background: var(--orange); color: white; }

.msg-bubble {
  max-width: 80%;
  padding: 12px 16px;
  font-size: 13px;
  line-height: 1.65;
}
.msg.assistant .msg-bubble {
  background: white;
  border: 1px solid var(--border);
  border-left: 3px solid var(--navy);
  color: var(--dark);
}
.msg.user .msg-bubble {
  background: var(--navy);
  color: white;
}

/* Formatted content inside bubbles */
.msg-bubble p { margin: 0 0 6px; }
.msg-bubble p:last-of-type { margin-bottom: 0; }
.msg-bubble .msg-h1 { font-size: 15px; font-weight: 900; color: var(--navy); margin: 14px 0 6px; }
.msg-bubble .msg-h2 { font-size: 13px; font-weight: 900; color: var(--navy); margin: 12px 0 4px; }
.msg-bubble .msg-h3 { font-size: 11px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: .06em; margin: 10px 0 4px; }
.msg-bubble .msg-li { padding: 2px 0 2px 10px; border-left: 2px solid #E8E8E8; margin: 2px 0; }
.msg-bubble .msg-sep { height: 6px; }
.msg-bubble strong { color: var(--orange); font-weight: 700; }

/* Action buttons */
.msg-actions {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.action-btn {
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--light);
  background: var(--bg);
  border: 1px solid var(--border);
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.action-btn:hover { color: var(--orange); border-color: var(--orange); background: #FFF5F0; }

/* Typing */
.typing-dots {
  display: flex;
  gap: 5px;
  padding: 12px 16px;
  background: white;
  border: 1px solid var(--border);
  border-left: 3px solid var(--navy);
  align-items: center;
}
.dot {
  width: 7px;
  height: 7px;
  background: var(--navy);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: .35; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* ERROR */
.error-bar {
  background: #FFF3E0;
  border: 1px solid #FFB74D;
  border-left: 3px solid var(--orange);
  padding: 10px 14px;
  font-size: 12px;
  color: #7B3A00;
}

/* INPUT */
.input-wrap {
  flex-shrink: 0;
  padding: 0 0 16px;
}
.input-box {
  display: flex;
  background: white;
  border: 2px solid var(--border);
  transition: border-color .15s;
}
.input-box:focus-within { border-color: var(--navy); }
#userInput {
  flex: 1;
  border: none;
  outline: none;
  padding: 12px 14px;
  font-size: 14px;
  font-family: inherit;
  resize: none;
  background: transparent;
  color: var(--dark);
  line-height: 1.5;
  max-height: 100px;
  overflow-y: auto;
}
#userInput::placeholder { color: #bbb; }
.send-btn {
  width: 46px;
  height: 46px;
  background: var(--navy);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  align-self: flex-end;
  transition: background .15s;
  flex-shrink: 0;
}
.send-btn:hover:not(:disabled) { background: var(--orange); }
.send-btn:disabled { background: var(--border); cursor: not-allowed; }
.send-btn svg { fill: white; width: 17px; height: 17px; }
.input-footer {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  padding: 0 2px;
}
.input-hint { font-size: 11px; color: #bbb; }
.clear-btn {
  font-size: 11px;
  color: #bbb;
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  text-decoration: underline;
}
.clear-btn:hover { color: var(--orange); }

/* MODAL */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-bg.open { display: flex; }
.modal {
  background: white;
  width: 100%;
  max-width: 500px;
  border-top: 4px solid var(--orange);
}
.modal-header {
  background: var(--navy);
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-title { font-size: 13px; font-weight: 900; color: white; }
.modal-close {
  background: none;
  border: none;
  color: rgba(255,255,255,.6);
  font-size: 22px;
  cursor: pointer;
  line-height: 1;
  padding: 0;
}
.modal-body { padding: 18px 20px; }
.modal-hint { font-size: 12px; color: var(--light); margin-bottom: 14px; line-height: 1.5; }
.modal-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--light); margin-bottom: 5px; }
.modal-textarea {
  width: 100%;
  border: 2px solid var(--border);
  padding: 10px;
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
  margin-bottom: 12px;
  line-height: 1.5;
}
.modal-textarea:focus { outline: none; border-color: var(--navy); }
.modal-context {
  width: 100%;
  border: 1px solid #EBEBEB;
  padding: 8px 10px;
  font-size: 11px;
  font-family: inherit;
  color: #aaa;
  background: var(--bg);
  resize: none;
  margin-bottom: 16px;
}
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
.btn-cancel {
  padding: 9px 16px;
  background: none;
  border: 1px solid var(--border);
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  color: var(--mid);
}
.btn-submit {
  padding: 9px 18px;
  background: var(--navy);
  color: white;
  border: none;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
}
.btn-submit:hover { background: var(--orange); }

/* FOOTER */
.page-footer {
  background: var(--navy);
  border-top: 3px solid var(--orange);
  padding: 10px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.pf-brand { font-size: 9px; font-weight: 900; color: var(--orange); text-transform: uppercase; letter-spacing: .08em; }
.pf-info { font-size: 9px; color: rgba(255,255,255,.3); }

@media (max-width: 600px) {
  .header { padding: 12px 16px; }
  .header-badge { display: none; }
  .body-wrap { padding: 0 12px; }
  .welcome-grid { grid-template-columns: 1fr; }
  .page-footer { padding: 10px 16px; }
}

/* LOGIN */
.login-screen {
  position: fixed;
  inset: 0;
  background: var(--navy);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  flex-direction: column;
  gap: 0;
}
.login-box {
  background: white;
  width: 100%;
  max-width: 400px;
  border-top: 4px solid var(--orange);
  padding: 36px 32px;
}
.login-logo { margin-bottom: 24px; }
.login-logo-top { font-size: 11px; font-weight: 900; color: var(--orange); text-transform: uppercase; letter-spacing: .1em; }
.login-logo-bot { font-size: 11px; font-weight: 900; color: var(--navy); text-transform: uppercase; letter-spacing: .1em; }
.login-title { font-size: 20px; font-weight: 900; color: var(--navy); margin-bottom: 6px; }
.login-title span { color: var(--orange); }
.login-sub { font-size: 13px; color: var(--light); margin-bottom: 24px; }
.login-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--light); margin-bottom: 6px; }
.login-input {
  width: 100%;
  border: 2px solid var(--border);
  padding: 11px 14px;
  font-size: 14px;
  font-family: inherit;
  margin-bottom: 16px;
  color: var(--dark);
}
.login-input:focus { outline: none; border-color: var(--navy); }
.login-btn {
  width: 100%;
  background: var(--navy);
  color: white;
  border: none;
  padding: 13px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
}
.login-btn:hover { background: var(--orange); }

.duty-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--light); margin-bottom: 8px; }
.duty-name { font-size: 18px; font-weight: 900; color: var(--navy); }
.duty-name span { color: var(--orange); }
.duty-slot { font-size: 12px; color: var(--light); margin-top: 2px; }
.duty-next { font-size: 11px; color: var(--light); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
.duty-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 0 auto 20px;
  max-width: 700px;
}
.duty-widget {
  border: 1px solid var(--border);
  border-top: 3px solid var(--orange);
  background: white;
  padding: 14px 18px;
}
.duty-widget.lead { border-top-color: var(--navy); }
.sources {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.source-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 700;
  color: var(--navy);
  text-decoration: none;
  background: #F0F3FA;
  border: 1px solid #D0D8EE;
  padding: 4px 10px;
  letter-spacing: .04em;
  transition: all .15s;
}
.source-link:hover { background: var(--navy); color: white; }
.source-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--light); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.login-error {
  background: #FFF3E0;
  border: 1px solid #FFB74D;
  border-left: 3px solid var(--orange);
  padding: 10px 14px;
  font-size: 12px;
  color: #7B3A00;
  margin-bottom: 16px;
  display: none;
}


</head>
